!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Southeast Weather Map</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: #000;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    #map {
      width: 100%;
      height: 100vh;
      background: #000;
    }

    .leaflet-container {
      background: #000;
    }

    .state-label {
      background: transparent !important;
      border: none !important;
      box-shadow: none !important;
      color: #6f6f6f;
      font-size: 11px;
      font-weight: 600;
      text-shadow: 0 0 2px #000, 0 0 4px #000;
      padding: 0;
    }

    .state-label::before {
      display: none !important;
    }

    .model-panel {
      position: absolute;
      top: 80px;
      left: 12px;
      z-index: 1000;
      background: rgba(10, 10, 10, 0.78);
      border: 1px solid #555;
      border-radius: 8px;
      padding: 10px;
      color: white;
      width: 175px;
    }

    .model-panel h3 {
      margin: 0 0 8px;
      font-size: 14px;
      text-align: center;
    }

    .model-panel button {
      width: 100%;
      margin: 4px 0;
      padding: 7px;
      background: #1b1b1b;
      color: white;
      border: 1px solid #555;
      border-radius: 5px;
      cursor: pointer;
      font-size: 12px;
    }

    .model-panel button.active {
      background: #0078ff;
      border-color: #66b2ff;
    }

    .model-panel hr {
      border: none;
      border-top: 1px solid #444;
      margin: 8px 0;
    }

    #loop-status {
      text-align: center;
      font-size: 12px;
      color: #aaa;
      margin: 6px 0;
    }

    #logo-container {
      position: absolute;
      top: 12px;
      right: 12px;
      z-index: 2000;
      background: rgba(0, 0, 0, 0.15);
      border-radius: 8px;
      padding: 4px;
    }

    #logo-container img {
      display: block;
      max-width: 220px;
      max-height: 120px;
      width: auto;
      height: auto;
      object-fit: contain;
      filter: drop-shadow(0 0 6px rgba(0,0,0,0.7));
    }

    @media (max-width: 768px) {
      .model-panel {
        top: 70px;
        left: 8px;
        width: 145px;
        padding: 8px;
      }

      .model-panel h3 {
        font-size: 12px;
      }

      .model-panel button {
        font-size: 11px;
        padding: 5px;
      }

      #logo-container {
        top: 8px;
        right: 8px;
      }

      #logo-container img {
        max-width: 120px;
        max-height: 70px;
      }
    }
  </style>
</head>

<body>

  <div id="map"></div>

  <div id="logo-container">
    <img src="logo.png" alt="Logo">
  </div>

  <div class="model-panel">
    <h3>Weather Layers</h3>

    <button onclick="toggleReflectivity()" id="toggle-reflectivity">
      HRRR Reflectivity: OFF
    </button>

    <button onclick="toggleLoop()" id="toggle-loop">
      Play Loop
    </button>

    <div id="loop-status">Frame: Now</div>

    <hr>

    <button onclick="toggleInterstates()" id="toggle-interstates">
      Interstates: ON
    </button>

    <button onclick="toggleCounties()" id="toggle-counties">
      Counties: ON
    </button>
  </div>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script src="https://unpkg.com/topojson-client@3"></script>

  <script>
    const map = L.map("map", {
      zoomControl: true,
      attributionControl: false,
      minZoom: 5,
      maxZoom: 9,
      maxBounds: [
        [23.0, -96.5],
        [38.0, -74.0]
      ],
      maxBoundsViscosity: 1.0
    });

    map.setView([32.5, -87.0], 6);

    const allowedStates = [
      "Tennessee",
      "North Carolina",
      "South Carolina",
      "Georgia",
      "Florida",
      "Alabama",
      "Mississippi",
      "Arkansas",
      "Louisiana"
    ];

    const allowedStateFips = [
      "47", "37", "45", "13", "12", "01", "28", "05", "22"
    ];

    let reflectivityOn = false;
    let currentReflectivityLayer = null;

    let loopRunning = false;
    let loopTimer = null;
    let loopIndex = 0;

    let interstateLayer;
    let interstatesVisible = true;

    let countyLayer;
    let countiesVisible = true;

    const hrrrFrames = [
      { code: "F0000", label: "Now" },
      { code: "F0060", label: "+1 hr" },
      { code: "F0120", label: "+2 hr" },
      { code: "F0180", label: "+3 hr" },
      { code: "F0240", label: "+4 hr" },
      { code: "F0300", label: "+5 hr" },
      { code: "F0360", label: "+6 hr" },
      { code: "F0420", label: "+7 hr" },
      { code: "F0480", label: "+8 hr" },
      { code: "F0540", label: "+9 hr" },
      { code: "F0600", label: "+10 hr" },
      { code: "F0660", label: "+11 hr" },
      { code: "F0720", label: "+12 hr" },
      { code: "F0840", label: "+14 hr" },
      { code: "F0960", label: "+16 hr" },
      { code: "F1080", label: "+18 hr" }
    ];

    fetch("https://raw.githubusercontent.com/PublicaMundi/MappingAPI/master/data/geojson/us-states.json")
      .then(response => response.json())
      .then(data => {
        const filteredStates = {
          type: "FeatureCollection",
          features: data.features.filter(feature =>
            allowedStates.includes(feature.properties.name)
          )
        };

        L.geoJSON(filteredStates, {
          style: {
            color: "#4a4a4a",
            weight: 1,
            fillColor: "#000000",
            fillOpacity: 1
          },
          onEachFeature: function(feature, layer) {
            layer.bindTooltip(feature.properties.name, {
              permanent: true,
              direction: "center",
              className: "state-label",
              opacity: 1
            });
          }
        }).addTo(map);
      });

    fetch("https://cdn.jsdelivr.net/npm/us-atlas@3/counties-10m.json")
      .then(response => response.json())
      .then(us => {
        const counties = topojson.feature(us, us.objects.counties);

        const filteredCounties = {
          type: "FeatureCollection",
          features: counties.features.filter(feature => {
            const fips = String(feature.id).padStart(5, "0").substring(0, 2);
            return allowedStateFips.includes(fips);
          })
        };

        countyLayer = L.geoJSON(filteredCounties, {
          style: {
            color: "#2a2a2a",
            weight: 0.35,
            opacity: 0.55,
            fillOpacity: 0
          }
        });

        countyLayer.addTo(map);
      });

    fetch("interstates.geojson")
      .then(response => response.json())
      .then(data => {
        interstateLayer = L.geoJSON(data, {
          style: {
            color: "#2b5ea8",
            weight: 0.7,
            opacity: 0.18
          }
        });

        interstateLayer.addTo(map);
      })
      .catch(() => {
        console.warn("interstates.geojson not found yet.");
      });

    function getHRRRUrl(hourCode) {
      return `https://mesonet.agron.iastate.edu/cache/tile.py/1.0.0/hrrr::REFD-${hourCode}-0/{z}/{x}/{y}.png`;
    }

    function updateReflectivityLayer() {
      if (currentReflectivityLayer) {
        map.removeLayer(currentReflectivityLayer);
        currentReflectivityLayer = null;
      }

      if (!reflectivityOn) return;

      const frame = hrrrFrames[loopIndex];

      document.getElementById("loop-status").textContent =
        "Frame: " + frame.label;

      currentReflectivityLayer = L.tileLayer(getHRRRUrl(frame.code), {
        opacity: 0.72
      }).addTo(map);
    }

    function toggleReflectivity() {
      reflectivityOn = !reflectivityOn;

      const button = document.getElementById("toggle-reflectivity");

      if (reflectivityOn) {
        button.textContent = "HRRR Reflectivity: ON";
        button.classList.add("active");
      } else {
        button.textContent = "HRRR Reflectivity: OFF";
        button.classList.remove("active");
        stopLoop();
      }

      updateReflectivityLayer();
    }

    function toggleLoop() {
      if (!reflectivityOn) {
        reflectivityOn = true;

        const reflectivityButton =
          document.getElementById("toggle-reflectivity");

        reflectivityButton.textContent = "HRRR Reflectivity: ON";
        reflectivityButton.classList.add("active");

        updateReflectivityLayer();
      }

      if (loopRunning) {
        stopLoop();
      } else {
        startLoop();
      }
    }

    function startLoop() {
      loopRunning = true;

      const button = document.getElementById("toggle-loop");
      button.textContent = "Pause Loop";
      button.classList.add("active");

      loopTimer = setInterval(() => {
        loopIndex = (loopIndex + 1) % hrrrFrames.length;
        updateReflectivityLayer();
      }, 900);
    }

    function stopLoop() {
      loopRunning = false;

      if (loopTimer) {
        clearInterval(loopTimer);
        loopTimer = null;
      }

      const button = document.getElementById("toggle-loop");

      if (button) {
        button.textContent = "Play Loop";
        button.classList.remove("active");
      }
    }

    function toggleInterstates() {
      if (!interstateLayer) return;

      const button = document.getElementById("toggle-interstates");

      if (interstatesVisible) {
        map.removeLayer(interstateLayer);
        button.textContent = "Interstates: OFF";
      } else {
        interstateLayer.addTo(map);
        button.textContent = "Interstates: ON";
      }

      interstatesVisible = !interstatesVisible;
    }

    function toggleCounties() {
      if (!countyLayer) return;

      const button = document.getElementById("toggle-counties");

      if (countiesVisible) {
        map.removeLayer(countyLayer);
        button.textContent = "Counties: OFF";
      } else {
        countyLayer.addTo(map);
        button.textContent = "Counties: ON";
      }

      countiesVisible = !countiesVisible;
    }
  </script>

</body>
</html>
