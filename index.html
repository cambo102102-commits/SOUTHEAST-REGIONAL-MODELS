<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Southeast Radar-Style Map</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: #000;
      overflow: hidden;
    }

    #map {
      width: 100%;
      height: 100vh;
      background: #000;
    }

    .leaflet-container {
      background: #000;
    }

    .state-label {
      color: white;
      font-size: 13px;
      font-weight: bold;
      text-shadow: 0 0 5px black;
    }
  </style>
</head>

<body>
  <div id="map"></div>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <script>
    const map = L.map("map", {
      zoomControl: true,
      attributionControl: false,
      minZoom: 5,
      maxZoom: 9,
      maxBounds: [
        [23.0, -95.5],
        [37.5, -74.0]
      ],
      maxBoundsViscosity: 1.0
    });

    map.setView([32.7, -84.8], 6);

    const allowedStates = [
      "Tennessee",
      "North Carolina",
      "South Carolina",
      "Georgia",
      "Florida",
      "Alabama",
      "Mississippi",
      "Arkansas"
    ];

    fetch("https://raw.githubusercontent.com/PublicaMundi/MappingAPI/master/data/geojson/us-states.json")
      .then(response => response.json())
      .then(data => {
        const filteredStates = {
          type: "FeatureCollection",
          features: data.features.filter(feature =>
            allowedStates.includes(feature.properties.name)
          )
        };

        L.geoJSON(filteredStates, {
          style: {
            color: "#888",
            weight: 1.5,
            fillColor: "#050505",
            fillOpacity: 1
          },
          onEachFeature: function(feature, layer) {
            layer.bindTooltip(feature.properties.name, {
              permanent: true,
              direction: "center",
              className: "state-label"
            });
          }
        }).addTo(map);
      });
  </script>
</body>
</html>
